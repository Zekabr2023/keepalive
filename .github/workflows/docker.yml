name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/zekabr2023/keepalive:latest
            ghcr.io/zekabr2023/keepalive:${{ github.sha }}

      - name: Trigger Portainer redeploy
        run: |
          echo "Notificando Portainer para atualizar o serviço..."
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            -X POST "https://nef-portainer.automabo.com.br/api/webhooks/8590051b-147c-4282-b745-8dc43af9ae2a"
          echo " — redeploy disparado!"
